<title>Blue Ridge Mountains</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:system-ui,sans-serif}

</style>

<figure>
  <img src="https://images.unsplash.com/photo-1646815211054-533d51d8ac27?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Rolling Blue Ridge mountain ridgelines stretching into the distance in summer haze" loading="lazy">
  <figcaption><strong>Blue Ridge Mountains, North Carolina.</strong> Asheville sits in this range and recorded the fastest year-on-year tourism growth of any major US city in this study at 5.6%, drawing 2 million summer visitors to a city of 94,000. Photo: Unsplash</figcaption>
