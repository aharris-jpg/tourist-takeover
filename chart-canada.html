<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Most Overtouristed Destinations in Canada (Summer 2026)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FDF8F0;font-family:system-ui,sans-serif;color:#1C2B3A}
.chart-wrap{max-width:720px;margin:0 auto;padding:0 0 16px;background:#FDF8F0}
.chart-header{background:#1C2B3A;padding:18px 20px 14px;position:relative;overflow:hidden}
.chart-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#D0021B,#8b0000,#D0021B);
  background-size:200% 100%;animation:shimmer 2.5s linear infinite;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.chart-title{font-size:1em;font-weight:700;color:#fff;line-height:1.3;margin-bottom:4px}
.chart-subtitle{font-size:.72em;color:rgba(255,255,255,0.6)}
.filter-row{
  display:flex;gap:6px;padding:12px 16px;background:#f0e8d8;
  border-bottom:1px solid #E8E0D0;overflow-x:auto;scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{
  font-family:system-ui,sans-serif;font-size:.72em;font-weight:600;
  padding:5px 12px;border-radius:20px;border:1px solid #E8E0D0;
  background:#FDF8F0;color:#5a6270;cursor:pointer;white-space:nowrap;transition:all .15s;
}
.filter-btn.active{background:#D0021B;color:#fff;border-color:#D0021B}
.filter-btn:hover:not(.active){background:#E8E0D0}
.bars-area{padding:14px 16px 6px;background:#FDF8F0}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-rank{font-size:.7em;font-weight:700;color:#5a6270;width:20px;text-align:right;flex-shrink:0}
.bar-label{font-size:.74em;color:#1C2B3A;width:155px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.bar-track{flex:1;background:#E8E0D0;border-radius:3px;height:24px;position:relative;overflow:visible;min-width:0;margin-right:8px}
.bar-fill{height:100%;border-radius:3px;position:relative;transition:width .4s ease;min-width:2px}
.bar-value{position:absolute;font-size:.65em;font-weight:700;top:50%;transform:translateY(-50%);white-space:nowrap;line-height:1}
.bar-value.inside{right:7px;color:#fff}
.bar-value.inside.light{color:#6b1010}
.bar-value.outside{left:calc(100% + 6px);color:#1C2B3A}
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 16px 4px;background:#FDF8F0}
.page-btn{
  font-family:system-ui,sans-serif;font-size:.72em;font-weight:600;
  padding:5px 14px;border-radius:4px;border:1px solid #E8E0D0;
  background:#FDF8F0;color:#1C2B3A;cursor:pointer;transition:all .15s;
}
.page-btn:hover:not(:disabled){background:#1C2B3A;color:#fff;border-color:#1C2B3A}
.page-btn:disabled{opacity:.35;cursor:default}
.page-label{font-size:.7em;color:#5a6270}
.chart-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 6px;flex-wrap:wrap;gap:6px;background:#FDF8F0;
  border-top:1px solid #E8E0D0;
}
.footer-note{font-size:.65em;color:#5a6270;line-height:1.4}
.footer-brand{font-size:.7em;font-weight:700;color:#D0021B;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap}
</style>
</head>
<body>
<div class="chart-wrap">
<div class="chart-header">
  <div class="chart-title">Most Overtouristed Destinations in Canada (Summer 2026)</div>
  <div class="chart-subtitle">Ranked by overcrowding probability &nbsp;·&nbsp; Peak season visitor-to-resident ratio</div>
</div>
<div class="filter-row">
  <button class="filter-btn active" onclick="setMetric('prob')">Overcrowding Risk</button>
  <button class="filter-btn" onclick="setMetric('ratio')">Peak Ratio</button>
  <button class="filter-btn" onclick="setMetric('growth')">YoY Growth</button>
</div>
<div class="bars-area" id="bars-area"></div>
<div class="pagination">
  <button class="page-btn" id="prev-btn" onclick="changePage(-1)" disabled>&#8592; Previous 10</button>
  <span class="page-label" id="page-label"></span>
  <button class="page-btn" id="next-btn" onclick="changePage(1)">Next 10 &#8594;</button>
</div>
<div class="chart-footer">
  <div class="footer-note">Sources: Statistics Canada NTS 2024 · Parks Canada · Destination Canada · Provincial DMOs · June 2026</div>
  <div class="footer-brand">Canada Sports Betting</div>
</div>
</div>
<script>
// prob = numeric probability value for bar sizing; probLabel = display string
var data=[
  {rank:1, name:"Banff, AB",            prob:75, probLabel:"Extreme Risk · 75%+", ratio:275,  growth:2.3},
  {rank:2, name:"Cavendish / PEI",      prob:75, probLabel:"Extreme Risk · 75%+", ratio:275,  growth:1.8},
  {rank:3, name:"Tofino, BC",           prob:50, probLabel:"High Risk · 50%",     ratio:110,  growth:4.2},
  {rank:4, name:"Canadian Rockies",     prob:50, probLabel:"High Risk · 50%",     ratio:143,  growth:4.2},
  {rank:5, name:"Whistler, BC",         prob:33, probLabel:"Moderate Risk · 33%", ratio:113,  growth:3.2},
  {rank:6, name:"Canmore, AB",          prob:17, probLabel:"Lower Risk · 17%",    ratio:62,   growth:5.8},
  {rank:7, name:"Niagara Falls, ON",    prob:17, probLabel:"Lower Risk · 17%",    ratio:50,   growth:2.8},
  {rank:8, name:"Muskoka, ON",          prob:17, probLabel:"Lower Risk · 17%",    ratio:31,   growth:2.8},
  {rank:9, name:"Laurentians, QC",      prob:10, probLabel:"Low Risk · <10%",     ratio:17,   growth:3.8},
  {rank:10,name:"Jasper, AB",           prob:10, probLabel:"Low Risk · <10%",     ratio:140,  growth:-43.6},
  {rank:11,name:"Vancouver, BC",        prob:10, probLabel:"Low Risk · <10%",     ratio:4,    growth:4.8},
  {rank:12,name:"Victoria, BC",         prob:10, probLabel:"Low Risk · <10%",     ratio:3,    growth:3.5},
  {rank:13,name:"Quebec City, QC",      prob:10, probLabel:"Low Risk · <10%",     ratio:3,    growth:3.2},
  {rank:14,name:"Kelowna / Okanagan",   prob:10, probLabel:"Low Risk · <10%",     ratio:6,    growth:3.8},
  {rank:15,name:"Cape Breton, NS",      prob:10, probLabel:"Low Risk · <10%",     ratio:5,    growth:3.2},
  {rank:16,name:"Prince Edward County", prob:10, probLabel:"Low Risk · <10%",     ratio:12,   growth:5.2},
  {rank:17,name:"Charlottetown, PE",    prob:10, probLabel:"Low Risk · <10%",     ratio:10,   growth:2.4},
  {rank:18,name:"Montreal, QC",         prob:10, probLabel:"Low Risk · <10%",     ratio:1,    growth:3.5},
  {rank:19,name:"Prince Edward Island", prob:10, probLabel:"Low Risk · <10%",     ratio:6,    growth:2.2},
  {rank:20,name:"Halifax, NS",          prob:10, probLabel:"Low Risk · <10%",     ratio:2,    growth:4.1},
  {rank:21,name:"Toronto, ON",          prob:10, probLabel:"Low Risk · <10%",     ratio:1,    growth:4.2},
  {rank:22,name:"Calgary, AB",          prob:10, probLabel:"Low Risk · <10%",     ratio:2,    growth:3.8},
  {rank:23,name:"Ottawa, ON",           prob:10, probLabel:"Low Risk · <10%",     ratio:2,    growth:5.0},
  {rank:24,name:"Edmonton, AB",         prob:10, probLabel:"Low Risk · <10%",     ratio:2,    growth:3.1},
  {rank:25,name:"Winnipeg, MB",         prob:10, probLabel:"Low Risk · <10%",     ratio:2,    growth:2.8}
];

// Tier colours matching article pills
function tierColor(prob) {
  if(prob>=75) return '#D0021B';
  if(prob>=60) return '#e03030';
  if(prob>=50) return '#e85858';
  if(prob>=33) return '#ee7c7c';
  if(prob>=17) return '#f4a0a0';
  return '#f8bfbf';
}

var metric='prob', page=0, perPage=10;

function setMetric(m){
  metric=m; page=0;
  document.querySelectorAll('.filter-btn').forEach(function(b,i){
    b.classList.toggle('active',['prob','ratio','growth'][i]===m);
  });
  render();
}
function changePage(d){page+=d; render();}

function render(){
  var sorted=data.slice().sort(function(a,b){
    if(metric==='growth') return b.growth-a.growth;
    if(metric==='ratio')  return b.ratio-a.ratio;
    return b.prob-a.prob;
  });
  var start=page*perPage, slice=sorted.slice(start,start+perPage);
  var maxVal=Math.max.apply(null,sorted.map(function(d){
    if(metric==='growth') return Math.abs(d.growth);
    if(metric==='ratio')  return d.ratio;
    return d.prob;
  }));
  if(!maxVal) maxVal=1;

  var html='';
  slice.forEach(function(d,i){
    var val, display, fillColor;
    if(metric==='prob'){
      val=d.prob; display=d.probLabel;
      fillColor=tierColor(d.prob);
    } else if(metric==='ratio'){
      val=d.ratio; display=d.ratio+':1';
      var op=0.4+(d.ratio/maxVal)*0.6;
      fillColor='rgba(28,43,58,'+op+')';
    } else {
      val=d.growth; display=(d.growth>0?'+':'')+d.growth.toFixed(1)+'%';
      var absG=Math.abs(d.growth);
      var opG=0.4+(absG/maxVal)*0.6;
      fillColor=d.growth<0?'rgba(180,40,40,'+opG+')':'rgba(28,43,58,'+opG+')';
    }
    var absVal=metric==='growth'?Math.abs(val):val;
    var pct=Math.max(2,(absVal/maxVal)*100);
    var inside=pct>52;
    var rankNum=start+i+1;
    var lightBar=metric==='prob'&&val<=17;
    var insideColor=lightBar?'color:#6b1010':'color:#fff';
    var outsideColor='color:#1C2B3A';
    html+='<div class="bar-row">'
      +'<div class="bar-rank">'+rankNum+'</div>'
      +'<div class="bar-label" title="'+d.name+'">'+d.name+'</div>'
      +'<div class="bar-track">'
      +'<div class="bar-fill" style="width:'+pct+'%;background:'+fillColor+'">'
      +(inside?'<span class="bar-value inside" style="'+insideColor+'">'+display+'</span>':'')
      +'</div>'
      +(!inside?'<span class="bar-value outside" style="'+outsideColor+'">'+display+'</span>':'')
      +'</div></div>';
  });
  document.getElementById('bars-area').innerHTML=html;
  var total=Math.ceil(sorted.length/perPage);
  document.getElementById('page-label').textContent='Showing '+(start+1)+'–'+Math.min(start+perPage,sorted.length)+' of '+sorted.length;
  document.getElementById('prev-btn').disabled=page===0;
  document.getElementById('next-btn').disabled=page>=total-1;
}
render();
</script>
</body>
</html>
